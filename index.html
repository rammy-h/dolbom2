<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합돌봄 민관협력 워크숍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#1A3328;--moss:#2D5A3D;--gold:#C9A84C;--gold2:#E8C96A;
  --mist:#8FBF9A;--paper:#F2F7F3;--muted:#6B8C74;--ink:#0C1A14;--border:#D8E8DC;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink)}
#inputScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:var(--forest)}
.eyebrow{font-size:.65rem;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
.hero-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:700;color:#fff;text-align:center;line-height:1.35;margin-bottom:8px}
.hero-sub{font-size:.82rem;color:var(--mist);text-align:center;margin-bottom:36px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:28px 24px;width:100%;max-width:520px}
.field-label{font-size:.65rem;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:8px}
.ev-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.fi{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(143,191,154,.2);border-radius:10px;padding:11px 14px;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;color:#fff;outline:none}
.fi::placeholder{color:rgba(143,191,154,.35)}
.sep{height:1px;background:rgba(143,191,154,.15);margin:18px 0}
textarea.fi{min-height:150px;resize:vertical;line-height:1.7}
.input-hint{font-size:.7rem;color:var(--mist);margin-top:8px;line-height:1.7}
.input-hint strong{color:var(--gold2)}
.err-box{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:10px 14px;color:#e88;font-size:.78rem;display:none;margin-top:10px}
.btn-analyze{width:100%;margin-top:18px;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0B1612;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}

#resultScreen{display:none}
.result-header{background:var(--forest);padding:16px 20px;position:relative}
.result-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.rh-eye{font-size:.6rem;letter-spacing:3px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.rh-title{font-family:'Noto Serif KR',serif;font-size:1.05rem;color:#fff;font-weight:600}
.rh-meta{font-size:.68rem;color:var(--mist);margin-top:3px}
.rh-actions{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.btn-action{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:6px 12px;color:var(--gold2);font-size:.68rem;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

.tab-bar{display:flex;background:var(--ink);border-bottom:1px solid rgba(201,168,76,.1);padding:0 16px;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:2px}
.tab-bar::-webkit-scrollbar-thumb{background:#333}
.tab-btn{padding:12px 13px;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;flex-shrink:0}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-sep{width:1px;background:rgba(255,255,255,.08);margin:10px 4px;flex-shrink:0}

.panel{display:none;padding:16px}
.panel.on{display:block}
.p-label{font-size:.68rem;color:var(--muted);margin-bottom:12px}

/* SVG 네트워크 */
.net-wrap{width:100%;background:linear-gradient(135deg,#F0F8F3,#E8F2EB);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.net-wrap svg{display:block;width:100%}

.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.leg-item{display:flex;align-items:center;gap:3px;font-size:.65rem;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.zoom-hint{font-size:.63rem;color:var(--muted);text-align:right;margin-top:5px;cursor:pointer}

/* 마인드맵 */
.mm-wrap{width:100%;background:var(--paper);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.mm-wrap svg{display:block;width:100%}

/* 순위 */
.rank-list{display:flex;flex-direction:column;gap:2px}
.rank-item{display:grid;grid-template-columns:28px 1fr 36px;align-items:center;gap:10px;padding:9px 14px;background:#fff;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
.rank-item:hover{border-color:var(--moss)}
.rank-num{font-size:.68rem;color:var(--muted);font-weight:700;text-align:right}
.rank-word{font-size:.85rem;font-weight:700;color:var(--ink)}
.rank-tag{font-size:.58rem;padding:1px 6px;border-radius:6px;margin-left:5px;font-weight:700;vertical-align:middle}
.bar-bg{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.bar-fill{height:100%;border-radius:2px}
.rank-count{font-size:.72rem;font-weight:700;color:var(--muted);text-align:right}

/* 공통 */
.csec{background:#fff;border-radius:14px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.clabel{font-size:.7rem;font-weight:700;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid}
.ctags{display:flex;flex-wrap:wrap;gap:6px}
.ctag{display:inline-flex;flex-direction:column;align-items:center;padding:5px 10px;border-radius:10px;border:1px solid;cursor:pointer}
.ctag-word{font-weight:700;font-size:.8rem}
.ctag-from{font-size:.58rem;margin-top:2px;opacity:.7}

/* 서브카드 */
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.sub-card{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.sub-card-title{font-size:.68rem;font-weight:700;color:var(--moss);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sub-tags{display:flex;flex-wrap:wrap;gap:4px}
.stag{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:8px}

/* 요약 */
.sum-card{background:var(--forest);padding:20px;margin-top:0}
.sum-eye{font-size:.62rem;letter-spacing:2px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:8px}
.sum-txt{font-family:'Noto Serif KR',serif;font-size:.88rem;color:rgba(255,255,255,.88);line-height:1.85}
.stat-row{display:flex;gap:20px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(201,168,76,.15)}
.stat{flex:1;text-align:center}
.stat-n{font-family:'Noto Serif KR',serif;font-size:1.4rem;font-weight:700;color:var(--gold2)}
.stat-l{font-size:.6rem;color:var(--mist);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}


/* 해결방향 */
.sol-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sol-card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:transform .15s}
.sol-card:hover{transform:translateY(-2px)}
.sol-card.highlight{border-color:var(--gold);box-shadow:0 4px 16px rgba(201,168,76,.15)}
.sol-header{padding:12px 16px;display:flex;align-items:center;gap:8px}
.sol-icon{font-size:1.2rem}
.sol-title{font-family:'Noto Serif KR',serif;font-size:.9rem;font-weight:700;color:#fff}
.sol-count{font-size:.65rem;color:rgba(255,255,255,.7);margin-top:1px}
.sol-keywords{display:flex;flex-wrap:wrap;gap:4px;padding:10px 16px;border-bottom:1px solid var(--border)}
.sol-kw{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:12px;cursor:pointer}
.sol-kw.active{opacity:1}
.sol-kw.inactive{opacity:.4}
.sol-body{padding:12px 16px}
.sol-section{margin-bottom:8px}
.sol-section-label{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.sol-items{display:flex;flex-direction:column;gap:3px}
.sol-item{font-size:.75rem;color:var(--ink);line-height:1.5;padding-left:10px;position:relative}
.sol-item::before{content:'→';position:absolute;left:0;color:var(--muted);font-size:.65rem}
/* 맥락 모달 */
.mov{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.8);align-items:center;justify-content:center;padding:16px}
.mov.on{display:flex}
.mbox{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:2px solid var(--gold);background:var(--forest)}
.mht{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;color:#fff}
.mclose{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 12px;color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.mbody{flex:1;overflow-y:auto;padding:16px 20px}
.ctx-item{background:var(--paper);border-radius:10px;border-left:3px solid;padding:12px 14px;margin-bottom:8px}
.ctx-table{font-size:.65rem;font-weight:700;margin-bottom:5px;letter-spacing:.5px}
.ctx-text{font-size:.82rem;color:var(--ink);line-height:1.7}
</style>
</head>
<body>

<div id="inputScreen">
  <div class="eyebrow">통합돌봄 민관협력 워크숍</div>
  <div class="hero-title">우리 지역의 목소리를<br>하나로 모읍니다</div>
  <div class="hero-sub">구글시트 한 번 복붙 → 주체별·전체 키워드 자동 시각화</div>
  <div class="card">
    <span class="field-label">행사 정보</span>
    <div class="ev-row">
      <input class="fi" type="text" id="evTitle" placeholder="행사명">
      <input class="fi" type="text" id="evDate" placeholder="날짜">
    </div>
    <div class="sep"></div>
    <span class="field-label">구글시트 붙여넣기</span>
    <textarea class="fi" id="pasteBox" placeholder="★통합 탭에서 Ctrl+A → Ctrl+C 후 여기에 Ctrl+V&#10;&#10;A열: 테이블명 (복지관1, 보건소1...)&#10;D열: 의견·키워드"></textarea>
    <p class="input-hint">📋 <strong>★통합 탭</strong> 전체 복사 후 붙여넣기</p>
    <div class="err-box" id="errBox"></div>
    <button class="btn-analyze" onclick="analyze()">키워드 추출 + 시각화</button>
  </div>
</div>

<div id="resultScreen">
  <div class="result-header">
    <div class="rh-eye">WORKSHOP RESULTS</div>
    <div class="rh-title" id="rhTitle">통합돌봄 민관협력 워크숍</div>
    <div class="rh-meta" id="rhMeta"></div>
    <div class="rh-actions">
      <button class="btn-action" onclick="toggleFS()">⛶ 전체화면</button>
      <button class="btn-action" onclick="goBack()">← 다시</button>
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="panelArea"></div>
  <div class="sum-card" id="sumCard" style="display:none">
    <div class="sum-eye">전체 요약</div>
    <div class="sum-txt" id="sumTxt"></div>
    <div class="stat-row" id="statRow"></div>
  </div>
</div>

<div class="mov" id="ctxMov" onclick="closeMov(event)">
  <div class="mbox">
    <div class="mhd">
      <div class="mht" id="ctxTitle"></div>
      <button class="mclose" onclick="closeMov()">✕ 닫기</button>
    </div>
    <div class="mbody" id="ctxBody"></div>
  </div>
</div>

<script>
const TH={
  '인력':      {bg:'#1A3328',fg:'#C8E6CD',lt:'#E1F5EE'},
  '예산·재정': {bg:'#9A6B00',fg:'#fff',   lt:'#FBF3DC'},

const TM={

  '예산·재정': ['예산','재정','수가','비용','급여','부담금'],
  '연계·협력': ['연계','협력','연결','창구','네트워크','회의','공유','정보','의뢰','조정'],
  '서비스':    ['서비스','돌봄','방문','재활','간호','교육','상담','관리','지원','프로그램'],
  '인프라':    ['시스템','자원','맵','목록','체계','환경','DB'],
  '대상자':    ['독거','치매','장애','이주민','외국인','수급자','환자','가족','보호자'],

function cls(w){for(const[t,ks]of Object.entries(TM)){if(ks.some(k=>w.includes(k)))return t;}return '기타';}

const STOP=new Set('있어,없어,너무,정말,그냥,이게,이거,거기,이렇게,저렇게,합니다,있습니다,없습니다,됩니다,해야,해서,하고,하는,하면,하지,하기,그리고,그런데,그래서,하지만,때문에,위해서,위한,대한,관련,통해,따라,이런,저런,어떤,같은,다른,많은,적은,필요,현재,현장,지금,아직,안됨,안되,못함,못해,안해,있음,없음,됨,함,함께,모두,전체,각각,및,등,이,가,을,를,은,는,에,의,와,과,도,만,로,으로,에서,에게,부터,까지,대해,입니다,이다,했다,한다,된다,이름,역할,소속,선택,입력,의견,키워드,자유,통합돌봄,민관협력,워크숍,수집,재가,병원,복지관,당사자,보호자,테이블,구분,행정,보건,안내,심각,어려움,부족,어르신,노인,지역,사업,기관,우리,분들,경우,내용,업무,진행,운영,상황,이용,대상,활동,생활,가정,사회,수행,추진,통합,돌봄'.split(','));


const SOLUTIONS = [
  {
    theme: '연계·협력',
    icon: '🔗',
    color: '#185FA5',
    keywords: ['연계','협력','창구','정보공유','의뢰','네트워크','조정'],
    short: [
      '월 1회 민관 통합 사례회의 정례화',

  {

  {

    icon: '🏠',
    color: '#0F6E56',
    keywords: ['당사자','가족','보호자','독거','치매','재가'],
    short: [
      '서비스 이용자 만족도 조사 정기 실시',
      '가족 돌봄자 휴식 지원 프로그램 연계',
      '재가-시설 중간 단계 서비스 발굴',
    ],
    long: [
      '당사자 참여 서비스 설계 체계 마련',
      '가족 돌봄자 지원 센터 운영',
      '재가 중심 돌봄 체계 강화 및 시설 대안 확대',
    ]
  },
];

function tok(t){return t.replace(/\t/g,' ').split(/[\n,，·.!?;:(){}"'\/\\]+/).flatMap(s=>s.split(/\s+/)).map(w=>w.trim().replace(/^[·\-*#\d]+/,'').trim()).filter(w=>w.length>=2&&!STOP.has(w)&&!/^\d+$/.test(w));}
function cntW(tokens){const m={};tokens.forEach(w=>{m[w]=(m[w]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function parseRows(text){const rows=[];for(const line of text.split('\n')){if(!line.trim())continue;const c=line.split('\t');const tc=c[0]?.trim(),oc=c[3]?.trim()||c[2]?.trim()||c[1]?.trim()||'';if(tc&&oc&&tc.length<=15&&!/^이름|^역할|^소속|^의견|^키워드|^테이블/.test(tc)&&!/^[A-Z]/.test(tc))rows.push({t:tc,o:oc});}return rows;}
function grp(t){return t.replace(/\s*\d+$/,'').trim();}

let _tmap={},_gmap={},_all=[],_tbs=[],_gps=[],_kwCtx={},_pc=0;

function buildCtx(rows){
  _kwCtx={};
  rows.forEach(r=>{
    r.o.split(/[,，]+/).map(s=>s.trim()).filter(s=>s.length>1).forEach(sent=>{
      tok(sent).forEach(w=>{
        if(!_kwCtx[w])_kwCtx[w]=[];
        if(_kwCtx[w].length<10)_kwCtx[w].push({table:r.t,sent});
      });
    });
  });
}

function analyze(){
  const text=document.getElementById('pasteBox').value.trim();
  if(text.length<10){showErr('내용을 붙여넣어 주세요.');return;}
  hideErr();
  const rows=parseRows(text);
  if(!rows.length){showErr('A열에 테이블명(복지관1, 보건소1...)이 있는지 확인해주세요.');return;}
  _tmap={};_gmap={};_all=[];
  rows.forEach(r=>{
    const t=r.t,g=grp(t),tk=tok(r.o);
    if(!_tmap[t])_tmap[t]={g,tk:[]};
    _tmap[t].tk.push(...tk);
    if(!_gmap[g])_gmap[g]=[];
    _gmap[g].push(...tk);
    _all.push(...tk);
  });
  _tbs=Object.keys(_tmap);_gps=Object.keys(_gmap);
  buildCtx(rows);

  document.getElementById('rhTitle').textContent=document.getElementById('evTitle').value.trim()||'통합돌봄 민관협력 워크숍';
  document.getElementById('rhMeta').textContent=[document.getElementById('evDate').value.trim(),_tbs.length+'개 테이블',_gps.length+'개 주체'].filter(Boolean).join('  ·  ');

  const bar=document.getElementById('tabBar'),area=document.getElementById('panelArea');
  bar.innerHTML='';area.innerHTML='';_pc=0;

  addTab(bar,area,'☁ 전체 네트워크',()=>netPanel(_all,'전체 통합'));
  addTab(bar,area,'◎ 마인드맵',()=>mmPanel());
  addTab(bar,area,'≡ 순위',()=>rankPanel(_all));
  addTab(bar,area,'◈ 공통 키워드',()=>commonPanel());
  addTab(bar,area,'💡 해결방향',()=>solutionPanel());
  addSep(bar);
  _gps.forEach(g=>{
    const sub=_tbs.filter(t=>grp(t)===g).map(t=>({n:t,tk:_tmap[t].tk}));
    addTab(bar,area,'▸ '+g,()=>groupPanel(_gmap[g],g,sub));
  });
  addSep(bar);
  _tbs.forEach(t=>addTab(bar,area,t,()=>netPanel(_tmap[t].tk,t)));

  const sc=document.getElementById('sumCard');sc.style.display='block';
  const top5=cntW(_all).slice(0,5).map(w=>w[0]).join(', ');
  document.getElementById('sumTxt').textContent=`주요 키워드는 ${top5} 등입니다. ${_gps.length}개 주체 ${_tbs.length}개 테이블에서 의견이 수집되었습니다.`;
  document.getElementById('statRow').innerHTML=`<div class="stat"><div class="stat-n">${_tbs.length}</div><div class="stat-l">테이블</div></div><div class="stat"><div class="stat-n">${_gps.length}</div><div class="stat-l">주체</div></div><div class="stat"><div class="stat-n">${cntW(_all).length}</div><div class="stat-l">키워드</div></div>`;

  document.getElementById('inputScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  switchTab(0);
}

function addTab(bar,area,label,fn){
  const idx=_pc++;
  const btn=document.createElement('button');
  btn.className='tab-btn'+(idx===0?' on':'');
  btn.textContent=label;btn.onclick=()=>switchTab(idx);
  bar.appendChild(btn);
  const p=document.createElement('div');
  p.className='panel'+(idx===0?' on':'');
  p.id='p'+idx;p._fn=fn;
  area.appendChild(p);
}
function addSep(bar){const s=document.createElement('div');s.className='tab-sep';bar.appendChild(s);}

function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('on',i===idx));
  const p=document.getElementById('p'+idx);
  if(p&&p._fn&&!p._done){p.innerHTML=p._fn();p._done=true;}
}

// ── SVG 네트워크 (신경망) ──
function netPanel(tokens,title){
  const words=cntW(tokens).slice(0,28);
  const max=words[0]?.[1]||1;
  const W=800,H=480,cx=W/2,cy=H/2;
  const placed=[];
  const nodes=[];

  words.forEach(([word,cnt],i)=>{
    const col=TH[cls(word)]||TH['기타'];
    const ratio=cnt/max;
    const r=Math.round(16+ratio*44);
    let x,y,ok=false;
    let angle=(i/words.length)*Math.PI*2,rad=20,tries=0;
    while(tries<600){
      angle+=0.32;rad+=2.2;
      x=cx+rad*Math.cos(angle)*1.08;
      y=cy+rad*Math.sin(angle)*0.7;
      tries++;
      if(x-r<6||x+r>W-6||y-r<6||y+r>H-6)continue;
      let hit=false;
      for(const p of placed){const dx=x-p.x,dy=y-p.y;if(Math.sqrt(dx*dx+dy*dy)<r+p.r+14){hit=true;break;}}
      if(!hit){ok=true;break;}
    }
    if(!ok){x=50+Math.random()*(W-100);y=50+Math.random()*(H-100);}
    placed.push({x,y,r});
    nodes.push({word,cnt,ratio,r,x,y,col});
  });

  // 연결선
  const thGrp={};
  nodes.forEach(n=>{if(!thGrp[n.col.bg])thGrp[n.col.bg]=[];thGrp[n.col.bg].push(n);});
  let lines='',signals='';
  let sigIdx=0;
  Object.values(thGrp).forEach(grp=>{
    if(grp.length<2)return;
    const hub=grp.reduce((a,b)=>a.cnt>b.cnt?a:b);
    grp.forEach(n=>{
      if(n===hub)return;
      const mx=(hub.x+n.x)/2+(n.y-hub.y)*0.25;
      const my=(hub.y+n.y)/2-(n.x-hub.x)*0.25;
      const pid=`lp${sigIdx++}`;
      const dur=(2+Math.random()*2).toFixed(1);
      const delay=(Math.random()*4).toFixed(1);
      const sw=Math.max(0.5,(hub.ratio+n.ratio)*1.8).toFixed(1);
      lines+=`<path d="M${hub.x.toFixed(0)},${hub.y.toFixed(0)} Q${mx.toFixed(0)},${my.toFixed(0)} ${n.x.toFixed(0)},${n.y.toFixed(0)}" stroke="${n.col.bg}" stroke-width="${sw}" fill="none" opacity="0.3"/>`;
      // 신호 파티클
      signals+=`<circle r="5" fill="${hub.col.bg}" opacity="0.85">
        <animateMotion dur="${dur}s" begin="${delay}s" repeatCount="indefinite" rotate="auto">
          <mpath href="#${pid}"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;0.9;0.9;0" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>
      </circle>
      <path id="${pid}" d="M${hub.x.toFixed(0)},${hub.y.toFixed(0)} Q${mx.toFixed(0)},${my.toFixed(0)} ${n.x.toFixed(0)},${n.y.toFixed(0)}" fill="none"/>`;
    });
  });

  // 노드
  const nodesSVG=nodes.map(n=>{
    const dur=(2.5+Math.random()*2).toFixed(1);
    const delay=(Math.random()*3).toFixed(1);
    const fs=Math.round(Math.max(n.r*0.46,9));
    const r2=(n.r*1.07).toFixed(1);
    return `<g onclick="showCtx('${n.word.replace(/'/g,"\\'")}');" style="cursor:pointer">
      <circle cx="${n.x.toFixed(0)}" cy="${n.y.toFixed(0)}" r="${(n.r*2.2).toFixed(0)}" fill="${n.col.bg}" opacity="0.08">
        <animate attributeName="r" values="${(n.r*1.8).toFixed(0)};${(n.r*2.8).toFixed(0)};${(n.r*1.8).toFixed(0)}" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.12;0.04;0.12" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>
      </circle>
      <circle cx="${n.x.toFixed(0)}" cy="${n.y.toFixed(0)}" r="${n.r}" fill="${n.col.bg}" opacity="0.92">
        <animate attributeName="r" values="${n.r};${r2};${n.r}" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>
      </circle>
      <text x="${n.x.toFixed(0)}" y="${n.y.toFixed(0)}" text-anchor="middle" dominant-baseline="middle" fill="${n.col.fg}" font-size="${fs}" font-weight="700" font-family="Noto Sans KR,sans-serif" style="pointer-events:none">${n.word}</text>
    </g>`;
  }).join('');

  const legHTML=Object.entries(TH).map(([nm,c])=>`<div class="leg-item"><div class="leg-dot" style="background:${c.bg}"></div>${nm}</div>`).join('');

  return `<div class="p-label">${title} · 노드 클릭하면 원문 보기</div>
<div class="net-wrap">
  <svg viewBox="0 0 ${W} ${H}">
    <defs><radialGradient id="nbg" cx="50%" cy="50%"><stop offset="0%" stop-color="#F5FBF6"/><stop offset="100%" stop-color="#E4F0E8"/></radialGradient></defs>
    <rect width="${W}" height="${H}" fill="url(#nbg)"/>
    ${lines}${signals}${nodesSVG}
  </svg>
</div>
<div class="legend">${legHTML}</div>`;
}

// ── 마인드맵 SVG ──
function mmPanel(){
  const words=cntW(_all);
  const max=words[0]?.[1]||1;
  const groups={};
  words.slice(0,48).forEach(([w,c])=>{
    const t=cls(w);if(!groups[t])groups[t]=[];
    if(groups[t].length<5)groups[t].push({w,c});
  });
  const keys=Object.keys(groups);
  const W=800,H=520,cx=W/2,cy=H/2;
  const CR=48,R1=110,R2=220;
  let svg='';

  // 중심
  svg+=`<radialGradient id="cg" cx="50%" cy="50%"><stop offset="0%" stop-color="#2D5A3D"/><stop offset="100%" stop-color="#1A3328"/></radialGradient>`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${CR}" fill="url(#cg)" stroke="#C9A84C" stroke-width="2"/>`;
  svg+=`<text x="${cx}" y="${cy-8}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="14" font-weight="700" font-family="Noto Serif KR,serif">통합돌봄</text>`;
  svg+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" dominant-baseline="middle" fill="#C9A84C" font-size="10" font-family="Noto Sans KR,sans-serif">민관협력</text>`;

  keys.forEach((theme,ti)=>{
    const a=(ti/keys.length)*Math.PI*2-Math.PI/2;
    const tx=cx+R1*Math.cos(a),ty=cy+R1*Math.sin(a);
    const col=TH[theme]||TH['기타'];
    const TR=28;
    svg+=`<line x1="${(cx+CR*Math.cos(a)).toFixed(0)}" y1="${(cy+CR*Math.sin(a)).toFixed(0)}" x2="${(tx-TR*Math.cos(a)).toFixed(0)}" y2="${(ty-TR*Math.sin(a)).toFixed(0)}" stroke="${col.bg}" stroke-width="2" opacity="0.5"/>`;
    svg+=`<circle cx="${tx.toFixed(0)}" cy="${ty.toFixed(0)}" r="${TR}" fill="${col.bg}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>`;
    svg+=`<text x="${tx.toFixed(0)}" y="${ty.toFixed(0)}" text-anchor="middle" dominant-baseline="middle" fill="${col.fg}" font-size="10" font-weight="700" font-family="Noto Sans KR,sans-serif">${theme}</text>`;
    const kws=groups[theme]||[];
    kws.forEach((kw,ki)=>{
      const sp=(ki-(kws.length-1)/2)*42;
      const px=Math.cos(a+Math.PI/2)*sp,py=Math.sin(a+Math.PI/2)*sp;
      const push=R2+(kw.c/max)*30;
      const kx=tx+Math.cos(a)*push+px,ky=ty+Math.sin(a)*push+py;
      const kr=Math.round(16+(kw.c/max)*12);
      svg+=`<line x1="${(tx+TR*Math.cos(a)).toFixed(0)}" y1="${(ty+TR*Math.sin(a)).toFixed(0)}" x2="${(kx-kr*Math.cos(a)).toFixed(0)}" y2="${(ky-kr*Math.sin(a)).toFixed(0)}" stroke="${col.bg}" stroke-width="1.2" opacity="0.35"/>`;
      svg+=`<circle cx="${kx.toFixed(0)}" cy="${ky.toFixed(0)}" r="${kr}" fill="${col.lt}" stroke="${col.bg}" stroke-width="1.5" style="cursor:pointer" onclick="showCtx('${kw.w}')"/>`;
      svg+=`<text x="${kx.toFixed(0)}" y="${ky.toFixed(0)}" text-anchor="middle" dominant-baseline="middle" fill="${col.bg}" font-size="${Math.max(kr*0.55,8).toFixed(0)}" font-weight="700" font-family="Noto Sans KR,sans-serif" style="pointer-events:none">${kw.w}</text>`;
    });
  });

  return `<div class="p-label">통합돌봄 마인드맵 · 키워드 클릭하면 원문 보기</div>
<div class="mm-wrap"><svg viewBox="0 0 ${W} ${H}"><defs>${svg.match(/<radialGradient.*?<\/radialGradient>/)?.[0]||''}</defs><rect width="${W}" height="${H}" fill="#F2F7F3"/>${svg.replace(/<radialGradient.*?<\/radialGradient>/,'')}</svg></div>`;
}

// ── 순위 ──
function rankPanel(tokens){
  const words=cntW(tokens).slice(0,20);
  const max=words[0]?.[1]||1;
  return `<div class="p-label">언급 빈도 순위 · 클릭하면 원문 보기</div>
<div class="rank-list">${words.map(([w,c],i)=>{
    const col=TH[cls(w)]||TH['기타'];
    return `<div class="rank-item" onclick="showCtx('${w}')">
<span class="rank-num">${i+1}</span>
<div><div class="rank-word">${w}<span class="rank-tag" style="background:${col.bg};color:${col.fg}">${cls(w)}</span></div>
<div class="bar-bg"><div class="bar-fill" style="width:${Math.round(c/max*100)}%;background:${col.bg}"></div></div></div>
<span class="rank-count">${c}</span></div>`;
  }).join('')}</div>`;
}

// ── 공통 키워드 ──
function commonPanel(){
  if(_gps.length<2)return '<div class="p-label">주체가 2개 이상 있어야 합니다</div>';
  const gSets=_gps.map(g=>({n:g,set:new Set(cntW(_gmap[g]).slice(0,30).map(w=>w[0]))}));
  const allW=[...new Set(gSets.flatMap(g=>[...g.set]))];
  const common=allW.map(word=>{const inG=gSets.filter(g=>g.set.has(word)).map(g=>g.n);return{word,inG,cnt:inG.length};}).filter(w=>w.cnt>=2).sort((a,b)=>b.cnt-a.cnt);
  const aC=common.filter(w=>w.cnt===_gps.length);
  const hC=common.filter(w=>w.cnt>=Math.ceil(_gps.length/2)&&w.cnt<_gps.length);
  const pC=common.filter(w=>w.cnt>=2&&w.cnt<Math.ceil(_gps.length/2));
  function sec(words,label,accent){
    if(!words.length)return'';
    return`<div class="csec"><div class="clabel" style="color:${accent};border-color:${accent}40">${label} <span style="font-size:.6rem;font-weight:400;color:var(--muted)">${words.length}개</span></div>
<div class="ctags">${words.slice(0,18).map(w=>{const col=TH[cls(w.word)]||TH['기타'];const sz=0.75+(w.cnt/_gps.length)*0.4;return`<div class="ctag" onclick="showCtx('${w.word}')" style="background:${col.lt};border-color:${col.bg}40"><span class="ctag-word" style="font-size:${sz}rem;color:${col.bg}">${w.word}</span><span class="ctag-from" style="color:${col.bg}">${w.inG.join('·')}</span></div>`;}).join('')}</div></div>`;
  }
  return`<div class="p-label">여러 주체 공통 언급 · 클릭하면 원문 보기</div>${sec(aC,'● 모든 주체 공통','#C9A84C')}${sec(hC,'● 과반 주체 공통','#2D5A3D')}${sec(pC,'● 일부 주체 공통','#185FA5')}`;
}

// ── 기관 합본 ──
function groupPanel(tokens,groupName,sub){
  const wc=netPanel(tokens,groupName+' 합본');
  const cards=sub.map(s=>{const sc=cntW(s.tk).slice(0,8);return`<div class="sub-card"><div class="sub-card-title">${s.n}</div><div class="sub-tags">${sc.map(([w])=>{const col=TH[cls(w)]||TH['기타'];return`<span class="stag" style="background:${col.bg};color:${col.fg}">${w}</span>`;}).join('')}</div></div>`;}).join('');
  return wc+`<div class="sub-grid">${cards}</div>`;
}


// ── 해결방향 패널 ──
function solutionPanel(){
  const wordCounts = {};
  cntW(_all).forEach(([w,c])=>{ wordCounts[w]=c; });

  // 언급 많은 순 정렬
  const sorted = SOLUTIONS.map(sol=>({
    ...sol,
    cnt: sol.keywords.reduce((s,k)=>s+(wordCounts[k]||0),0)
  })).sort((a,b)=>b.cnt-a.cnt);

  const items = sorted.map((sol,i)=>{
    const kwStr = sol.keywords.filter(k=>wordCounts[k]>0).slice(0,4).join('·');
    const allItems = [...sol.short, ...sol.long];
    return `<div style="padding:14px 0;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start">
      <div style="width:28px;height:28px;border-radius:50%;background:${sol.color};color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">${i+1}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:.95rem;font-weight:700;color:${sol.color}">${sol.icon} ${sol.theme}</span>
          ${sol.cnt>0?`<span style="font-size:.65rem;background:${sol.color}18;color:${sol.color};padding:1px 7px;border-radius:10px;font-weight:700">${sol.cnt}회 언급</span>`:''}
          ${kwStr?`<span style="font-size:.65rem;color:var(--muted)">${kwStr}</span>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${allItems.map(s=>`<div style="font-size:.8rem;color:var(--ink);line-height:1.6;padding-left:12px;position:relative"><span style="position:absolute;left:0;color:${sol.color};font-weight:700">→</span>${s}</div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="p-label">오늘 많이 언급된 순서 · 키워드 클릭하면 원문 보기</div>
<div style="background:#fff;border-radius:14px;border:1px solid var(--border);padding:4px 16px">
  ${items}
</div>`;
}

// ── 맥락 보기 ──
function showCtx(word){
  const list=_kwCtx[word]||[];
  const col=TH[cls(word)]||TH['기타'];
  document.getElementById('ctxTitle').textContent='"'+word+'" 관련 원문';
  const body=document.getElementById('ctxBody');
  if(!list.length){body.innerHTML='<div style="padding:20px;color:var(--muted)">관련 원문이 없습니다.</div>';}
  else{
    body.innerHTML=`<div style="font-size:.65rem;color:var(--muted);margin-bottom:10px">${list.length}건 언급</div>`+
    list.map(c=>{const hi=c.sent.replace(new RegExp(word,'g'),`<mark style="background:${col.lt};color:${col.bg};font-weight:700;padding:1px 3px;border-radius:3px">${word}</mark>`);
    return`<div class="ctx-item" style="border-color:${col.bg}"><div class="ctx-table" style="color:${col.bg}">📋 ${c.table}</div><div class="ctx-text">${hi}</div></div>`;}).join('');
  }
  document.getElementById('ctxMov').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeMov(e){if(!e||e.target===document.getElementById('ctxMov')){document.getElementById('ctxMov').classList.remove('on');document.body.style.overflow='';}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMov();});

function goBack(){document.getElementById('resultScreen').style.display='none';document.getElementById('inputScreen').style.display='flex';document.getElementById('sumCard').style.display='none';}
function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
function showErr(m){const b=document.getElementById('errBox');b.textContent=m;b.style.display='block';}
function hideErr(){document.getElementById('errBox').style.display='none';}
</script>
