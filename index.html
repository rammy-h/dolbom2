<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합돌봄 민관협력 워크숍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F7F3;
  --surface:#FFFFFF;
  --surface2:#EDF4EF;
  --border:#D8E8DC;
  --border2:#C0D8C8;
  --gold:#C9A84C;
  --gold2:#E8C96A;
  --gold-dim:#8A7030;
  --green:#2D5A3D;
  --green2:#4A8C5C;
  --green-dim:#1A3328;
  --text:#0C1A14;
  --text2:#4A6A50;
  --text3:#7A9A80;
  --white:#FFFFFF;
  --red:#C0392B;
  --blue:#185FA5;
  --purple:#6B3FA0;
  --orange:#C0672B;
  --teal:#0F7A5A;
  --wine:#8B2252;
  --grey:#555555;
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}

/* ── 입력 화면 ── */
#inputScreen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 20px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#2D5A3D44 0%,transparent 70%), #1A3328;
}
.eyebrow{font-size:.65rem;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;opacity:.9}
.hero-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:700;color:var(--white);text-align:center;line-height:1.35;margin-bottom:8px}
.hero-sub{font-size:.82rem;color:var(--text2);text-align:center;margin-bottom:36px;letter-spacing:.3px}
.input-card{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border2);
  border-radius:20px;padding:28px 24px;
  width:100%;max-width:520px;
  backdrop-filter:blur(8px);
}
.field-label{font-size:.65rem;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:8px}
.ev-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.fi{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid var(--border2);border-radius:10px;
  padding:11px 14px;font-family:'Noto Sans KR',sans-serif;
  font-size:.83rem;color:var(--text);outline:none;
  transition:border-color .2s;
}
.fi:focus{border-color:var(--gold-dim)}
.fi::placeholder{color:var(--text3)}
.sep{height:1px;background:var(--border);margin:18px 0}
textarea.fi{min-height:150px;resize:vertical;line-height:1.7}
.input-hint{font-size:.7rem;color:var(--text3);margin-top:8px;line-height:1.7}
.input-hint strong{color:var(--gold2)}
.err-box{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:10px 14px;color:#e88;font-size:.78rem;display:none;margin-top:10px}
.btn-analyze{
  width:100%;margin-top:18px;padding:14px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#0B1612;border:none;border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;font-size:.9rem;font-weight:700;
  cursor:pointer;letter-spacing:.3px;
  box-shadow:0 4px 20px rgba(200,169,110,.2);
  transition:opacity .2s,transform .2s;
}
.btn-analyze:hover{opacity:.92;transform:translateY(-1px)}

/* ── 결과 화면 ── */
#resultScreen{display:none}
.result-header{
  background:#1A3328;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.result-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.rh-eye{font-size:.6rem;letter-spacing:3px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.rh-title{font-family:'Noto Serif KR',serif;font-size:1.05rem;color:var(--white);font-weight:600}
.rh-meta{font-size:.68rem;color:var(--text3);margin-top:3px}
.rh-actions{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.btn-action{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);
  border-radius:8px;padding:6px 12px;color:var(--gold2);
  font-size:.68rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:background .15s;
}
.btn-action:hover{background:rgba(200,169,110,.12)}

/* ── 탭바 ── */
.tab-bar{
  display:flex;background:#0C1A14;
  border-bottom:1px solid var(--border);
  padding:0 16px;overflow-x:auto;
}
.tab-bar::-webkit-scrollbar{height:2px}
.tab-bar::-webkit-scrollbar-thumb{background:var(--border2)}
.tab-btn{
  padding:12px 14px;font-size:.7rem;font-weight:700;
  color:#6B8C74;cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;flex-shrink:0;
  transition:color .15s;
}
.tab-btn:hover{color:var(--text2)}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-sep{width:1px;background:var(--border);margin:10px 4px;flex-shrink:0}

/* ── 패널 ── */
.panel{display:none;padding:20px}
.panel.on{display:block}
.panel-label{font-size:.68rem;color:var(--text3);margin-bottom:12px;letter-spacing:.5px}

/* ── Canvas ── */
canvas.viz{
  display:block;border-radius:14px;
  background:var(--surface);
  border:1px solid var(--border2);
  cursor:zoom-in;max-width:100%;
}
.zoom-hint{font-size:.63rem;color:var(--text3);text-align:right;margin-top:6px;cursor:pointer;transition:color .15s}
.zoom-hint:hover{color:var(--gold)}

/* ── 범례 ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--text3)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── 순위 ── */
.rank-list{display:flex;flex-direction:column;gap:2px}
.rank-item{
  display:grid;grid-template-columns:28px 1fr 36px;
  align-items:center;gap:10px;padding:9px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s;
}
.rank-item:hover{background:var(--surface2);border-color:var(--border2)}
.rank-num{font-size:.68rem;color:var(--text3);font-weight:700;text-align:right}
.rank-word{font-size:.85rem;font-weight:700;color:var(--text)}
.rank-tag{font-size:.58rem;padding:1px 6px;border-radius:6px;margin-left:5px;font-weight:700;vertical-align:middle}
.rank-bar-bg{height:3px;background:var(--border2);border-radius:2px;margin-top:3px}
.rank-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.rank-count{font-size:.72rem;font-weight:700;color:var(--text3);text-align:right}

/* ── 공통 키워드 ── */
.common-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;margin-bottom:12px;
}
.common-block-title{
  font-size:.68rem;font-weight:700;letter-spacing:.5px;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.common-tags{display:flex;flex-wrap:wrap;gap:6px}
.ctag{
  display:inline-flex;flex-direction:column;align-items:center;
  padding:5px 10px;border-radius:10px;border:1px solid;
  cursor:pointer;transition:opacity .15s;
}
.ctag:hover{opacity:.8}
.ctag-word{font-weight:700;font-size:.8rem}
.ctag-from{font-size:.58rem;margin-top:2px;opacity:.7}

/* ── 서브카드 ── */
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.sub-card-title{font-size:.68rem;font-weight:700;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sub-tags{display:flex;flex-wrap:wrap;gap:4px}
.stag{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:8px}

/* ── 요약 ── */
.summary-card{
  background:#1A3328;border-top:1px solid #2D5A3D;
  padding:20px;
}
.summary-eye{font-size:.62rem;letter-spacing:2px;color:#C9A84C;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.summary-text{font-family:'Noto Serif KR',serif;font-size:.88rem;color:rgba(255,255,255,.85);line-height:1.85}
.stat-row{display:flex;gap:20px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.stat-item{flex:1;text-align:center}
.stat-n{font-family:'Noto Serif KR',serif;font-size:1.4rem;font-weight:700;color:var(--gold2)}
.stat-l{font-size:.6rem;color:#8FBF9A;margin-top:2px;letter-spacing:.5px;text-transform:uppercase}

/* ── 맥락 모달 ── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.on{display:flex}
.modal-box{
  background:#fff;border:1px solid var(--border);
  border-radius:18px;width:100%;max-width:600px;
  max-height:90vh;display:flex;flex-direction:column;
  overflow:hidden;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:#1A3328;border-radius:18px 18px 0 0;
}
.modal-header::after{display:none}
.modal-title{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;color:#fff}
.modal-close{
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  border-radius:8px;padding:5px 12px;color:var(--text2);
  font-size:.72rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.ctx-item{
  background:var(--surface2);border-radius:10px;
  border-left:3px solid;padding:12px 14px;margin-bottom:8px;
}
.ctx-table{font-size:.65rem;font-weight:700;margin-bottom:5px;letter-spacing:.5px}
.ctx-text{font-size:.82rem;color:var(--text2);line-height:1.7}
.ctx-text mark{font-weight:700;background:transparent;border-radius:3px;padding:0 2px}

/* ── 전체화면 캔버스 모달 ── */
.canvas-modal-overlay{
  display:none;position:fixed;inset:0;z-index:998;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;padding:16px;
}
.canvas-modal-overlay.on{display:flex}
.canvas-modal-box{
  background:#fff;border:1px solid var(--border);
  border-radius:18px;width:100%;max-width:1100px;
  max-height:95vh;display:flex;flex-direction:column;overflow:hidden;
}
.canvas-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.canvas-modal-title{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;color:var(--white)}
.canvas-modal-body{flex:1;padding:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
</style>
</head>
<body>

<!-- 입력 화면 -->
<div id="inputScreen">
  <div class="eyebrow">통합돌봄 민관협력 워크숍</div>
  <div class="hero-title">우리 지역의 목소리를<br>하나로 모읍니다</div>
  <div class="hero-sub">구글시트 한 번 복붙 → 주체별·전체 키워드 자동 시각화</div>
  <div class="input-card">
    <span class="field-label">행사 정보</span>
    <div class="ev-row">
      <input class="fi" type="text" id="evTitle" placeholder="행사명">
      <input class="fi" type="text" id="evDate" placeholder="날짜">
    </div>
    <div class="sep"></div>
    <span class="field-label">구글시트 붙여넣기</span>
    <textarea class="fi" id="pasteBox" placeholder="★통합 탭에서 Ctrl+A → Ctrl+C 후 여기에 Ctrl+V&#10;&#10;A열: 테이블명 (복지관1, 보건소1...)&#10;D열: 의견·키워드"></textarea>
    <p class="input-hint">📋 <strong>★통합 탭</strong> 전체 복사 후 한 번만 붙여넣기</p>
    <div class="err-box" id="errBox"></div>
    <button class="btn-analyze" onclick="analyze()">키워드 추출 + 시각화</button>
  </div>
</div>

<!-- 결과 화면 -->
<div id="resultScreen">
  <div class="result-header">
    <div class="rh-eye">WORKSHOP RESULTS</div>
    <div class="rh-title" id="rhTitle">통합돌봄 민관협력 워크숍</div>
    <div class="rh-meta" id="rhMeta"></div>
    <div class="rh-actions">
      <button class="btn-action" onclick="toggleFS()">⛶ 전체화면</button>
      <button class="btn-action" onclick="goBack()">← 다시</button>
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="panelArea"></div>
  <div class="summary-card" id="summaryCard" style="display:none">
    <div class="summary-eye">전체 요약</div>
    <div class="summary-text" id="summaryText"></div>
    <div class="stat-row" id="statRow"></div>
  </div>
</div>

<!-- 맥락 모달 -->
<div class="modal-overlay" id="ctxModal" onclick="closeCtxModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="ctxModalTitle"></div>
      <button class="modal-close" onclick="closeCtxModal()">✕ 닫기</button>
    </div>
    <div class="modal-body" id="ctxModalBody"></div>
  </div>
</div>

<!-- 캔버스 전체화면 모달 -->
<div class="canvas-modal-overlay" id="canvasModal" onclick="closeCanvasModal(event)">
  <div class="canvas-modal-box">
    <div class="canvas-modal-header">
      <div class="canvas-modal-title" id="canvasModalTitle"></div>
      <button class="modal-close" onclick="closeCanvasModal()">✕ 닫기</button>
    </div>
    <div class="canvas-modal-body" id="canvasModalBody"></div>
  </div>
</div>

<script>
// ── 색상 테마 ──
const TH = {
  '인력':      {bg:'#1A3328', fg:'#C8E6CD', lt:'#E1F5EE', bg_dark:'#1A3328'},
  '예산·재정': {bg:'#9A6B00', fg:'#fff',    lt:'#FBF3DC', bg_dark:'#9A6B00'},
  '연계·협력': {bg:'#185FA5', fg:'#fff',    lt:'#E6F1FB', bg_dark:'#185FA5'},
  '서비스':    {bg:'#6B3FA0', fg:'#fff',    lt:'#F0E8FB', bg_dark:'#6B3FA0'},
  '인프라':    {bg:'#C0392B', fg:'#fff',    lt:'#FAECE7', bg_dark:'#C0392B'},
  '대상자':    {bg:'#0F6E56', fg:'#fff',    lt:'#E1F5EE', bg_dark:'#0F6E56'},
  '정책·제도': {bg:'#8B2252', fg:'#fff',    lt:'#FBEAF0', bg_dark:'#8B2252'},
  '기타':      {bg:'#555555', fg:'#fff',    lt:'#F1EFE8', bg_dark:'#555555'},
};

const TM = {
  '인력':      ['인력','간호사','요양보호사','종사자','담당자','사회복지사','치료사','의사','선생님','직원'],
  '예산·재정': ['예산','재정','수가','비용','급여','부담금','지원금','비용'],
  '연계·협력': ['연계','협력','연결','창구','네트워크','회의','공유','정보','의뢰','조정','연락'],
  '서비스':    ['서비스','돌봄','방문','재활','간호','교육','상담','관리','지원','프로그램','말벗'],
  '인프라':    ['시스템','자원','맵','목록','체계','환경','DB','인프라'],
  '대상자':    ['독거','치매','장애','이주민','외국인','수급자','환자','가족','보호자'],
  '정책·제도': ['정책','제도','기준','역할','지위','공식','허브','칸막이','규정','법'],
};

function classify(w) {
  for (const [t, ks] of Object.entries(TM)) {
    if (ks.some(k => w.includes(k))) return t;
  }
  return '기타';
}

const STOP = new Set('있어,없어,너무,정말,그냥,이게,이거,거기,이렇게,저렇게,합니다,있습니다,없습니다,됩니다,해야,해서,하고,하는,하면,하지,하기,그리고,그런데,그래서,하지만,때문에,위해서,위한,대한,관련,통해,따라,이런,저런,어떤,같은,다른,많은,적은,필요,현재,현장,지금,아직,안됨,안되,못함,못해,안해,있음,없음,됨,함,함께,모두,전체,각각,및,등,이,가,을,를,은,는,에,의,와,과,도,만,로,으로,에서,에게,부터,까지,대해,입니다,이다,했다,한다,된다,이름,역할,소속,선택,입력,의견,키워드,자유,통합돌봄,민관협력,워크숍,수집,재가,병원,복지관,당사자,보호자,테이블,구분,행정,보건,안내,심각,어려움,부족,어르신,노인,지역,사업,기관,우리,분들,경우,내용,업무,진행,운영,상황,이용,대상,활동,생활,가정,사회,수행,추진,통합,돌봄'.split(','));

function tok(text) {
  return text.replace(/\t/g, ' ')
    .split(/[\n,，·.!?;:(){}"'\/\\]+/)
    .flatMap(s => s.split(/\s+/))
    .map(w => w.trim().replace(/^[·\-*#\d]+/, '').trim())
    .filter(w => w.length >= 2 && !STOP.has(w) && !/^\d+$/.test(w));
}

function countWords(tokens) {
  const m = {};
  tokens.forEach(w => { m[w] = (m[w] || 0) + 1; });
  return Object.entries(m).sort((a, b) => b[1] - a[1]);
}

function parseRows(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const c = line.split('\t');
    const tc = c[0]?.trim(), oc = c[3]?.trim() || c[2]?.trim() || c[1]?.trim() || '';
    if (tc && oc && tc.length <= 15 && !/^이름|^역할|^소속|^의견|^키워드|^테이블/.test(tc) && !/^[A-Z]/.test(tc))
      rows.push({ t: tc, o: oc });
  }
  return rows;
}

function getGroup(t) { return t.replace(/\s*\d+$/, '').trim(); }

// 맥락 데이터
let _kwCtx = {};
function buildCtx(rows) {
  _kwCtx = {};
  rows.forEach(r => {
    const sents = r.o.split(/[,，]+/).map(s => s.trim()).filter(s => s.length > 1);
    sents.forEach(sent => {
      tok(sent).forEach(w => {
        if (!_kwCtx[w]) _kwCtx[w] = [];
        if (_kwCtx[w].length < 10) _kwCtx[w].push({ table: r.t, sent });
      });
    });
  });
}

let _tmap = {}, _gmap = {}, _all = [], _tables = [], _groups = [];
let _pc = 0;

function analyze() {
  const text = document.getElementById('pasteBox').value.trim();
  if (text.length < 10) { showErr('내용을 붙여넣어 주세요.'); return; }
  hideErr();
  const rows = parseRows(text);
  if (!rows.length) { showErr('A열에 테이블명(복지관1, 보건소1...)이 있는지 확인해주세요.'); return; }

  _tmap = {}; _gmap = {}; _all = [];
  rows.forEach(r => {
    const t = r.t, g = getGroup(t), tk = tok(r.o);
    if (!_tmap[t]) _tmap[t] = { g, tk: [] };
    _tmap[t].tk.push(...tk);
    if (!_gmap[g]) _gmap[g] = [];
    _gmap[g].push(...tk);
    _all.push(...tk);
  });
  _tables = Object.keys(_tmap);
  _groups = Object.keys(_gmap);
  buildCtx(rows);

  const title = document.getElementById('evTitle').value.trim() || '통합돌봄 민관협력 워크숍';
  const date = document.getElementById('evDate').value.trim();
  document.getElementById('rhTitle').textContent = title;
  document.getElementById('rhMeta').textContent = [date, _tables.length + '개 테이블', _groups.length + '개 주체'].filter(Boolean).join('  ·  ');

  const bar = document.getElementById('tabBar'), area = document.getElementById('panelArea');
  bar.innerHTML = ''; area.innerHTML = ''; _pc = 0;

  addTab(bar, area, '☁ 전체 워드클라우드', () => wcPanel(_all, '전체 통합'));
  addTab(bar, area, '◎ 마인드맵', () => mmPanel());
  addTab(bar, area, '≡ 순위', () => rankPanel(_all));
  addTab(bar, area, '◈ 공통 키워드', () => commonPanel());

  addSep(bar);
  _groups.forEach(g => {
    const sub = _tables.filter(t => getGroup(t) === g).map(t => ({ n: t, tk: _tmap[t].tk }));
    addTab(bar, area, '▸ ' + g, () => groupPanel(_gmap[g], g, sub));
  });

  addSep(bar);
  _tables.forEach(t => addTab(bar, area, t, () => wcPanel(_tmap[t].tk, t)));

  const top5 = countWords(_all).slice(0, 5).map(w => w[0]).join(', ');
  const sc = document.getElementById('summaryCard');
  sc.style.display = 'block';
  document.getElementById('summaryText').textContent = `주요 키워드는 ${top5} 등입니다. ${_groups.length}개 주체 ${_tables.length}개 테이블에서 의견이 수집되었습니다.`;
  document.getElementById('statRow').innerHTML = `
    <div class="stat-item"><div class="stat-n">${_tables.length}</div><div class="stat-l">테이블</div></div>
    <div class="stat-item"><div class="stat-n">${_groups.length}</div><div class="stat-l">주체</div></div>
    <div class="stat-item"><div class="stat-n">${countWords(_all).length}</div><div class="stat-l">키워드</div></div>`;

  document.getElementById('inputScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  setTimeout(() => activatePanel(0), 120);
}

function addTab(bar, area, label, fn) {
  const idx = _pc++;
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (idx === 0 ? ' on' : '');
  btn.textContent = label;
  btn.onclick = () => switchTab(idx);
  bar.appendChild(btn);
  const p = document.createElement('div');
  p.className = 'panel' + (idx === 0 ? ' on' : '');
  p.id = 'p' + idx; p._fn = fn;
  area.appendChild(p);
}

function addSep(bar) {
  const s = document.createElement('div');
  s.className = 'tab-sep';
  bar.appendChild(s);
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('on', i === idx));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('on', i === idx));
  activatePanel(idx);
}

function activatePanel(idx) {
  const p = document.getElementById('p' + idx);
  if (!p || !p._fn) return;
  if (!p._done) { p.innerHTML = p._fn(); p._done = true; }
  // window.innerWidth 기반으로 즉시 실행
  const W = window.innerWidth - 60;
  const mm = p.querySelector('canvas[data-type="mm"]');
  if (mm) { mm._fixedW = W; drawCanvas(mm, W); }
  const wc = p.querySelector('canvas.anim-wc');
  if (wc) { wc._fixedW = W; startNetworkAnim(wc, W); }
}

// ── 캔버스 그리기 ──
function drawCanvas(cv, W, H) {
  W = W || cv._fixedW || window.innerWidth - 60;

  cv.width = W; cv.height = H;

// ── 워드클라우드 ──
function wcPanel(tokens, title) {

  const wj = JSON.stringify(words).replace(/'/g, '&#39;');
  const legHTML = Object.entries(TH).map(([n, c]) =>
    `<div class="leg-item"><div class="leg-dot" style="background:${c.stroke}"></div>${n}</div>`
  ).join('');
  return `<div class="panel-label">${title} · 크기=언급빈도 · 색=주제 · 클릭하면 크게 보기</div>
<canvas class="viz" data-type="wc" data-words='${wj}' onclick="openCanvasModal(this,'${title} 워드클라우드','wc')"></canvas>
<div class="legend">${legHTML}</div>
<div class="zoom-hint" onclick="openCanvasModal(this.previousElementSibling.previousElementSibling,'${title} 워드클라우드','wc')">🔍 크게 보기</div>`;
}

function drawWC(cv, words, W, H) {
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#F2F7F3';
  ctx.fillRect(0, 0, W, H);
  const max = words[0]?.[1] || 1;
  const placed = [];
  const cx = W / 2, cy = H / 2;
  const rots = [-18, -10, -5, 0, 0, 0, 5, 10, 18];

  words.forEach(([word, cnt]) => {
    const col = TH[classify(word)] || TH['기타'];
    const ratio = cnt / max;
    const size = Math.round(11 + ratio * H * 0.16);
    const rot = rots[Math.floor(Math.random() * rots.length)] * Math.PI / 180;
    ctx.save();
    ctx.font = `700 ${size}px "Noto Sans KR",sans-serif`;
    const tw = ctx.measureText(word).width + 6;
    const th = size * 1.35;
    let x = cx, y = cy, ok = false;
    let angle = Math.random() * Math.PI * 2, r = 0, tries = 0;
    while (tries < 500) {
      angle += 0.35; r += 0.9;
      x = cx + r * Math.cos(angle) * 1.1;
      y = cy + r * Math.sin(angle) * 0.6;
      tries++;
      if (x - tw / 2 > 4 && x + tw / 2 < W - 4 && y - th / 2 > 4 && y + th / 2 < H - 4) {
        let hit = false;
        for (const p of placed) {
          if (Math.abs(x - p.x) < (tw + p.w) / 2 + 8 && Math.abs(y - p.y) < (th + p.h) / 2 + 5) { hit = true; break; }
        }
        if (!hit) { ok = true; break; }
      }
    }
    if (ok) {
      placed.push({ x, y, w: tw, h: th });
      ctx.translate(x, y); ctx.rotate(rot);
      ctx.globalAlpha = 0.5 + ratio * 0.5;
      ctx.fillStyle = col.bg_dark || col.stroke;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(word, 0, 0);
    }
    ctx.restore();
  });
}

// ── 마인드맵 ──
function mmPanel() {

<div class="zoom-hint" onclick="openCanvasModal(this.previousElementSibling,'통합돌봄 마인드맵','mm')">🔍 크게 보기</div>`;

function drawMM(cv, W, H) {
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#F2F7F3';
  ctx.fillRect(0, 0, W, H);

  const words = countWords(_all);
  const max = words[0]?.[1] || 1;
  const groups = {};
  words.slice(0, 48).forEach(([w, c]) => {
    const t = classify(w);
    if (!groups[t]) groups[t] = [];
    if (groups[t].length < 5) groups[t].push({ w, c });
  });

  const keys = Object.keys(groups);
  const cx = W / 2, cy = H / 2;
  const CR = Math.min(W, H) * 0.08;
  const R1 = Math.min(W, H) * 0.155;
  const R2 = Math.min(W, H) * 0.28;

  // 중심원
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, CR);
  g.addColorStop(0, '#2D5A3D'); g.addColorStop(1, '#1A3328');
  ctx.beginPath(); ctx.arc(cx, cy, CR, 0, Math.PI * 2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#C8A96E'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `600 ${Math.round(CR * 0.3)}px "Noto Serif KR",serif`;
  ctx.fillText('통합돌봄', cx, cy - CR * 0.15);
  ctx.font = `400 ${Math.round(CR * 0.2)}px "Noto Sans KR",sans-serif`;
  ctx.fillStyle = '#C8A96E'; ctx.fillText('민관협력', cx, cy + CR * 0.28);

  keys.forEach((theme, ti) => {
    const a = (ti / keys.length) * Math.PI * 2 - Math.PI / 2;
    const tx = cx + R1 * Math.cos(a), ty = cy + R1 * Math.sin(a);
    const col = TH[theme] || TH['기타'];
    const TR = Math.min(W, H) * 0.055;

    // 연결선
    ctx.beginPath();
    ctx.moveTo(cx + CR * Math.cos(a), cy + CR * Math.sin(a));
    ctx.lineTo(tx - TR * Math.cos(a), ty - TR * Math.sin(a));
    ctx.strokeStyle = col.stroke + '60'; ctx.lineWidth = 1.5; ctx.stroke();

    // 주제원
    ctx.beginPath(); ctx.arc(tx, ty, TR, 0, Math.PI * 2);
    ctx.fillStyle = col.bg; ctx.fill();
    ctx.strokeStyle = col.stroke; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = col.fg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `700 ${Math.round(TR * 0.33)}px "Noto Sans KR",sans-serif`;
    ctx.fillText(theme, tx, ty);

    // 키워드
    const kws = groups[theme] || [];
    kws.forEach((kw, ki) => {
      const spread = (ki - (kws.length - 1) / 2) * (Math.min(W, H) * 0.055);
      const px = Math.cos(a + Math.PI / 2) * spread, py = Math.sin(a + Math.PI / 2) * spread;
      const push = R2 + (kw.c / max) * Math.min(W, H) * 0.04;
      const kx = tx + Math.cos(a) * push + px, ky = ty + Math.sin(a) * push + py;
      const kr = Math.min(W, H) * 0.028 + (kw.c / max) * Math.min(W, H) * 0.012;

      ctx.beginPath();
      ctx.moveTo(tx + TR * Math.cos(a), ty + TR * Math.sin(a));
      ctx.lineTo(kx - kr * Math.cos(a), ky - kr * Math.sin(a));
      ctx.strokeStyle = col.stroke + '40'; ctx.lineWidth = 1; ctx.stroke();

      ctx.beginPath(); ctx.arc(kx, ky, kr, 0, Math.PI * 2);
      ctx.fillStyle = col.lt || '#fff'; ctx.fill();
      ctx.strokeStyle = col.bg; ctx.lineWidth = 1.2; ctx.stroke();
      ctx.fillStyle = col.bg; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `700 ${Math.round(Math.max(kr * 0.6, 8))}px "Noto Sans KR",sans-serif`;
      ctx.fillText(kw.w, kx, ky);
    });
  });
}

// ── 공통 키워드 ──
function commonPanel() {
  if (_groups.length < 2) return '<div class="panel-label">주체가 2개 이상 있어야 합니다</div>';
  const gSets = _groups.map(g => ({ n: g, set: new Set(countWords(_gmap[g]).slice(0, 30).map(w => w[0])) }));
  const allW = [...new Set(gSets.flatMap(g => [...g.set]))];
  const common = allW.map(word => {
    const inG = gSets.filter(g => g.set.has(word)).map(g => g.n);
    return { word, inG, cnt: inG.length };
  }).filter(w => w.cnt >= 2).sort((a, b) => b.cnt - a.cnt);

  const allC = common.filter(w => w.cnt === _groups.length);
  const halfC = common.filter(w => w.cnt >= Math.ceil(_groups.length / 2) && w.cnt < _groups.length);
  const partC = common.filter(w => w.cnt >= 2 && w.cnt < Math.ceil(_groups.length / 2));

  function sec(words, label, accent) {
    if (!words.length) return '';
    const tags = words.slice(0, 20).map(w => {
      const col = TH[classify(w.word)] || TH['기타'];
      return `<div class="ctag" onclick="showCtx('${w.word}')" style="background:${col.bg};border-color:${col.stroke}">
<span class="ctag-word" style="color:${col.fg}">${w.word}</span>
<span class="ctag-from" style="color:${col.fg}">${w.inG.join('·')}</span>
</div>`;
    }).join('');
    return `<div class="common-block">
<div class="common-block-title" style="color:${accent}">${label} <span style="font-size:.6rem;font-weight:400;color:var(--text3)">${words.length}개</span></div>
<div class="common-tags">${tags}</div>
</div>`;
  }

  return `<div class="panel-label">여러 주체에서 공통 언급 · 클릭하면 원문 보기</div>
${sec(allC, '● 모든 주체 공통', '#C8A96E')}
${sec(halfC, '● 과반 주체 공통', '#3AA862')}
${sec(partC, '● 일부 주체 공통', '#185FA5')}`;
}

// ── 신경망 네트워크 애니메이션 ──
const _animMap = {};

function startNetworkAnim(cv, fixedW) {
  const id = cv.id;
  if (_animMap[id]) { cancelAnimationFrame(_animMap[id]); delete _animMap[id]; }

  // 크기 결정
  let W = fixedW || cv._fixedW || window.innerWidth - 60;
  W = Math.round(W) - 40;
  if (W < 50) W = 600;
  const H = Math.round(W * 0.62);
  cv.width = W; cv.height = H;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';

  const words = JSON.parse(cv.dataset.words || '[]');
  if (!words.length) return;
  const max = words[0]?.[1] || 1;
  const top = words.slice(0, 30);
  const cx = W/2, cy = H/2;
  const ctx = cv.getContext('2d');

  // 노드 생성
  const nodes = top.map(([word, cnt], i) => {
    const ratio = cnt / max;
    const r = Math.round(14 + ratio * Math.min(W,H) * 0.065);
    const col = TH[classify(word)] || TH['기타'];
    const angle = (i / top.length) * Math.PI * 2;
    const dist = 50 + Math.random() * Math.min(W,H) * 0.28;
    return {
      word, cnt, ratio, r, col,
      x: cx + dist * Math.cos(angle),
      y: cy + dist * Math.sin(angle) * 0.72,
      vx: (Math.random()-0.5) * 0.5,
      vy: (Math.random()-0.5) * 0.35,
      pulse: Math.random() * Math.PI * 2,
    };
  });

  // 연결
  const connections = [];
  for (let i=0;i<nodes.length;i++) {
    for (let j=i+1;j<nodes.length;j++) {
      const a=nodes[i], b=nodes[j];
      const dx=a.x-b.x, dy=a.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if (d < W*0.28 || a.col.bg===b.col.bg) {
        connections.push({a, b, strength: Math.max(0.1, 1-d/(W*0.4))});
      }
    }
  }

  // 신호
  const signals = [];
  let sigTimer = 0;

  function spawnSignal() {
    if (!connections.length) return;
    const conn = connections[Math.floor(Math.random()*connections.length)];
    const dir = Math.random() > 0.5;
    signals.push({ from: dir?conn.a:conn.b, to: dir?conn.b:conn.a, conn, t:0, speed:0.006+Math.random()*0.008 });
  }

  function getBezier(conn, t) {
    const {a,b}=conn;
    const mx=(a.x+b.x)/2+(b.y-a.y)*0.2;
    const my=(a.y+b.y)/2-(b.x-a.x)*0.2;
    return {
      x:(1-t)*(1-t)*a.x+2*(1-t)*t*mx+t*t*b.x,
      y:(1-t)*(1-t)*a.y+2*(1-t)*t*my+t*t*b.y
    };
  }

  // 클릭으로 원문 보기
  cv.onclick = (e) => {
    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX-rect.left)*(W/rect.width);
    const my = (e.clientY-rect.top)*(H/rect.height);
    for (const n of nodes) {
      const dx=mx-n.x, dy=my-n.y;
      if (Math.sqrt(dx*dx+dy*dy) < n.r+5) { showCtx(n.word); return; }
    }
  };
  cv.style.cursor = 'pointer';

  function draw() {
    ctx.clearRect(0,0,W,H);

    // 배경
    const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.8);
    bg.addColorStop(0,'#F5FBF6'); bg.addColorStop(1,'#E8F2EB');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // 물리
    nodes.forEach(n => {
      n.x+=n.vx; n.y+=n.vy;
      n.vx+=(cx-n.x)*0.0002; n.vy+=(cy-n.y)*0.0002;
      n.vx*=0.996; n.vy*=0.996;
      if(n.x<n.r+6){n.x=n.r+6;n.vx*=-0.6;}
      if(n.x>W-n.r-6){n.x=W-n.r-6;n.vx*=-0.6;}
      if(n.y<n.r+6){n.y=n.r+6;n.vy*=-0.6;}
      if(n.y>H-n.r-6){n.y=H-n.r-6;n.vy*=-0.6;}
      nodes.forEach(o => {
        if(o===n) return;
        const dx=n.x-o.x, dy=n.y-o.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const min=n.r+o.r+18;
        if(d<min){const f=(min-d)/min*0.06;n.vx+=dx/d*f;n.vy+=dy/d*f;}
      });
      n.pulse+=0.035;
    });

    // 연결선
    connections.forEach(({a,b,strength}) => {
      const mx2=(a.x+b.x)/2+(b.y-a.y)*0.2;
      const my2=(a.y+b.y)/2-(b.x-a.x)*0.2;
      const grad=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      grad.addColorStop(0,a.col.bg+'50'); grad.addColorStop(1,b.col.bg+'30');
      ctx.beginPath(); ctx.moveTo(a.x,a.y);
      ctx.quadraticCurveTo(mx2,my2,b.x,b.y);
      ctx.strokeStyle=grad; ctx.lineWidth=Math.max(0.5,(a.ratio+b.ratio)*1.2*strength);
      ctx.stroke();
    });

    // 신호 생성
    sigTimer++;
    if(sigTimer>35){sigTimer=0;spawnSignal();}

    // 신호 파티클
    for(let i=signals.length-1;i>=0;i--){
      const s=signals[i]; s.t+=s.speed;
      if(s.t>=1){signals.splice(i,1);continue;}
      const pos=getBezier(s.conn,s.t);
      const alpha=Math.sin(s.t*Math.PI);
      const g2=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,9);
      g2.addColorStop(0,'rgba(255,255,255,0.95)');
      g2.addColorStop(0.4,s.from.col.bg+'CC');
      g2.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(pos.x,pos.y,9,0,Math.PI*2);
      ctx.fillStyle=g2; ctx.globalAlpha=alpha; ctx.fill(); ctx.globalAlpha=1;
    }

    // 노드
    nodes.forEach(n => {
      const pulse=Math.sin(n.pulse)*0.08+0.92;
      const r=n.r*pulse;
      const glow=ctx.createRadialGradient(n.x,n.y,r*0.5,n.x,n.y,r*3);
      glow.addColorStop(0,n.col.bg+'40'); glow.addColorStop(1,n.col.bg+'00');
      ctx.beginPath(); ctx.arc(n.x,n.y,r*3,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
      const ng=ctx.createRadialGradient(n.x-r*0.25,n.y-r*0.25,r*0.1,n.x,n.y,r);
      ng.addColorStop(0,n.col.bg+'EE'); ng.addColorStop(1,n.col.bg+'BB');
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=ng; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
      const fs=Math.round(Math.max(r*0.5,8));
      ctx.font=`700 ${fs}px "Noto Sans KR",sans-serif`;
      ctx.fillStyle=n.col.fg; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=n.col.bg; ctx.shadowBlur=4;
      ctx.fillText(n.word,n.x,n.y); ctx.shadowBlur=0;
    });

    _animMap[id] = requestAnimationFrame(draw);
  }
  draw();
}

function openWCFullscreen(canvasId, title) {
  const srcCv = document.getElementById(canvasId);
  if (!srcCv) return;
  document.getElementById('canvasModalTitle').textContent = title;
  document.getElementById('canvasModal').classList.add('on');
  document.body.style.overflow = 'hidden';
  setTimeout(() => {
    const body = document.getElementById('canvasModalBody');
    body.innerHTML = '';
    const mc = document.createElement('canvas');
    mc.id = 'modal_' + canvasId;
    mc.dataset.words = srcCv.dataset.words;
    mc.style.borderRadius = '10px';
    body.appendChild(mc);
    setTimeout(() => startNetworkAnim(mc), 100);
  }, 80);
}

function goBack() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('inputScreen').style.display = 'flex';
  document.getElementById('summaryCard').style.display = 'none';
}
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
function showErr(m) { const b = document.getElementById('errBox'); b.textContent = m; b.style.display = 'block'; }
function hideErr() { document.getElementById('errBox').style.display = 'none'; }
</script>
